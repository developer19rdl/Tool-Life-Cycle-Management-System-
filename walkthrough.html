## 1. Application Overview

The **Honda Tool Lifecycle Management System** is a WPF desktop application that manages the complete lifecycle of measuring instruments and gauges used in Honda manufacturing facilities. It tracks:

- **Inventory** of instruments and gauges (add, edit, delete, import)
- **Interchangeability** — cycle-based issuance, receipt, and tracking of tools across departments
- **Calibration** — periodic calibration of instruments with pass/fail/TMU calculations
- **RFID tagging** — physical tool tracking via RFID scanners (USB and Gun)
- **Audit trails** — full history of every tool action with document attachments

> [!IMPORTANT]
> The system operates on a **6-month cycle** model:
> - **Yellow Cycle**: January–June (e.g., `Jan'26 Yellow Cycle`)
> - **Green Cycle**: July–December (e.g., `Jul'26 Green Cycle`)

## 5. Section 1 — Database

**Purpose:** Master data management — register all instruments and gauges into the system.

### How It Works

1. Click **Database** in the nav bar → **Database Management** page appears
2. Choose either **Instruments** or **Gauges** card
3. **Category Selection Page** loads all registered types for that category (from `type_details` table)
4. Click a type card → opens the specific **Management Page**

### Instrument Management Page

| Feature | Description |
|---------|-------------|
| **Add** | Opens `AddEditInstrumentWindow` — enter name, control no, color, model, size, section, location, RFID tag |
| **Edit** | Select a row → Edit button opens the same form pre-populated |
| **Delete** | Remove the selected instrument record |
| **Import** | Bulk import from Excel/CSV files with auto-header matching |
| **Pagination** | 20 records per page with `LIMIT`/`OFFSET` |
| **Filtering** | Filter by Line, Section, Location, Status |
| **Control No Generation** | Auto-generates based on `[Prefix]-[XXX]` pattern from `categorycontrol` table |

### Gauge Management Page

Same as instruments but with gauge-specific fields: Drawing No, Tolerance (Tol/Tol2/Tol3), Date of Addition.

> [!TIP]
> **Dynamic Table Architecture (DTA)**: Each instrument/gauge type gets its own MySQL table. When you add a new type in Settings, a new table is auto-created.

## 6. Section 2 — Interchangeability

**Purpose:** The core cycle-based tool interchange tracking system. This is the most complex section.

### Sub-Tabs

#### Tab 1: Department List
- **What it is:** A staging area for all instruments/gauges assigned to departments for the current cycle
- **Import:** Upload an Excel/CSV file containing Department, Instrument Name, Size, Control No, Color, Status
- **Auto-sync:** After import, data is automatically synced to the `interchangeability` table
- **Undo Import:** Removes the most recent batch of imported records
- **Filter by:** Department buttons and Cycle dropdown

#### Tab 2: Interchange (Main Tracking)
- **What it is:** Real-time status tracking of every tool in the active cycle
- **Statuses:** `Pending` → `Issued` → `Received` → `WOP` → `Write off` → `Re-introduction` → `Temp issuance`

```mermaid
flowchart TD
    A["Pending"] -->|"Issue Action"| B["Issued"]
    B -->|"Receive Action"| C["Received"]
    A -->|"Not Found"| D["WOP (Without Possession)"]
    D -->|"Found Later"| E["Re-introduction"]
    B -->|"Lost/Damaged"| F["Write Off"]
    F -->|"Found/Repaired"| E
    A -->|"Temp Loan"| G["Temp Issuance"]
    G -->|"Returned"| C

    style A fill:#FEF3C7,stroke:#F59E0B
    style B fill:#DBEAFE,stroke:#3B82F6
    style C fill:#D1FAE5,stroke:#10B981
    style D fill:#FEE2E2,stroke:#EF4444
    style E fill:#E0E7FF,stroke:#6366F1
    style F fill:#FCA5A5,stroke:#DC2626
    style G fill:#FDE68A,stroke:#D97706
```

**Action Buttons (context-sensitive):**

| Action | When Available | What It Does |
|--------|---------------|--------------|
| **Issue** | Status = Pending | Marks tool as issued to department |
| **Receive** | Status = Issued | Marks tool as returned/received |
| **WOP** | Status = Pending/Issued | Marks tool as "Without Possession" (missing) |
| **Write Off** | Any non-final status | Permanently writes off a tool (requires PDF document) |
| **Re-introduce** | Status = WOP/Write Off | Brings a tool back into circulation |
| **Temp Issuance** | Status = Pending | Temporary loan to another department |

**RFID Scanning:**
- Select an item → Scan its RFID tag (via USB reader or WiFi Gun)
- The system matches the RFID to the `interchangeability` record
- Supports **Bulk Scan Mode** for scanning multiple items at once

#### Tab 3: Interchange History
- **Pivot table view:** Rows = Control Numbers, Columns = Cycle Names
- Each cell shows the status of that tool in that cycle
- Clickable cells: Blue underlined statuses open **Event Details** or **Cycle History** windows
- Shows data from both `interchangeability` (current) and `interchange_history` (archived) tables

### Cycle Transitions

| Button | Description |
|--------|-------------|
| **Next Cycle** | Archives current cycle to history, carries over WOP items, resets Pending items |
| **Reset (Current Cycle)** | Deletes all data for the current cycle only, rolls back to previous |
| **Reset (All)** | Nuclear option — clears ALL interchange and calibration data |

### Sub-Tabs

- Click a **Control No** link to open the calibration form for that instrument

#### Tab 2: Regular Calibration — Instrument Cards

- Click a card → shows filtered list of that type's instruments

#### Tab 3: Regular Calibration — Gauge Cards

#### Tab 4: Calibration Master
- **Details sub-tab:** Shows master calibration records (by year) with uploaded documents

#### Tab 5: NG List

### Calibration Form Workflow

```mermaid
flowchart TD
    A["Open Calibration Form"] --> B["Enter Control No & Environment Data"]
    B --> C["System loads master limits from DB"]
    C --> D["Enter 4 trial observations"]
    D --> E["System calculates: Mean, Error, TMU"]
    E --> F{"All trials within tolerance?"}
    F -->|Yes| G["Result: OK ✅"]
    F -->|No| H["Result: NG ❌"]
    G --> I["Save to regular_calibration"]
    H --> I
    I --> J["Update calibration status & date"]
    J --> K["Added to NG List if NG"]
```

> [!NOTE]
> **TMU (Task Measurement Uncertainty)** is calculated automatically using the formula based on resolution, repeatability, and master uncertainty for each calibration type.

## 8. Section 4 — Inventory Management

**Purpose:** Comprehensive inventory auditing via RFID scanning and manual search.

### Sub-Tabs

#### Tab 1: Inventory Audit
- Cross-references `interchangeability` and `regular_calibration` tables
- Shows: Instrument Name, Control No, Cycle, Date, Time, Color, Status, Calibration info
- **Filters:** Cycle, Year, Color, Status, Calibration Status, Department, Date Range, Search text

#### Tab 2: Bulk Search (5 search modes)

| Mode | Description |
|------|-------------|
| **Bulk RFID Scan** | Scan multiple RFID tags → system identifies each |
| **Control No Wise** | Pre-load a list of control numbers → scan to verify presence |
| **Department Wise** | Select departments → scan to find matching items |
| **Instrument/Gauge Wise** | Select types → scan to find matching items |
| **Calibration Audit** | Scan items to verify calibration status (calibrated/not calibrated counts) |

Each mode supports both **WiFi RFID Gun** and **USB RFID Reader**.

#### Tab 3: Exclusion List
- **Add:** Scan RFID tags to add to exclusion list (excluded from audit counts)
- **Revoke:** Remove items from the exclusion list

## 10. Section 6 — Settings

**Purpose:** Configure all master data that the system relies on.

### Sub-Tabs

| Tab | What You Configure |
|-----|-------------------|
| **Types** | Add/Edit/Delete instrument and gauge types (each creates a dynamic DB table) |
| **Department** | Add/Delete department names for the `departmentmaster` table |
| **Instrument Sizes** | Define sizes and their control number prefixes (`categorycontrol` table) |
| **Gauge Sizes** | Same as above for gauges (`gauge_categorycontrol` table) |
| **Calibration Mapping** | Map instrument types to their calibration form windows |
| **Calibration Master Types** | Define master calibration instrument types (e.g., Gauge Block sets) |

> [!IMPORTANT]
> **Calibration Mapping** is critical — it tells the system which calibration form to open for each instrument prefix and size. Without this mapping, clicking a Control No in Calibration won't open any form.

## 13. Cycle Management

The system operates on 6-month cycles that drive the entire workflow:

```mermaid
flowchart LR
    C1["Jan'26 Yellow Cycle<br/>(Jan–Jun 2026)"] -->|"Next Cycle"| C2["Jul'26 Green Cycle<br/>(Jul–Dec 2026)"]
    C2 -->|"Next Cycle"| C3["Jan'27 Yellow Cycle<br/>(Jan–Jun 2027)"]

    style C1 fill:#FEF3C7,stroke:#F59E0B
    style C2 fill:#D1FAE5,stroke:#10B981
    style C3 fill:#FEF3C7,stroke:#F59E0B
```

**What happens during "Next Cycle" transition:**

1. Current cycle state is archived to `interchange_history`
2. **WOP items** carry forward to the new cycle (still WOP)
3. **Pending items** become WOP with reason "Not Issued"
4. **Temp Issuance items** become WOP with reason "Instrument/Gauge missing"
5. **Issued/Received items** reset to Pending in the new cycle
6. The `ActiveCycle` config value is updated

## 14. RFID Integration

The system supports two RFID hardware modes:

| Mode | Technology | Connection |
|------|-----------|------------|
| **USB Reader** | Serial COM port | `CommManager.vb` sends hex commands (`BB 00 22...`) |
| **WiFi RFID Gun** | TCP/IP streaming | `RFIDGunClient.vb` connects to gun's IP:Port |

Additionally, an **embedded REST API** runs on port 8080 (`RFIDApiServer.vb`) that accepts external RFID scan events and performs cross-table lookups.

### Step-by-Step Usage Guide

1. **Initial Setup (One-time)**
   - Go to **Settings** → Add instrument/gauge **Types**
   - Add **Departments** (AE, PE, Quality, etc.)
   - Add **Instrument/Gauge Sizes** with control number prefixes
   - Configure **Calibration Mapping** (link types to calibration forms)

2. **Register Tools**
   - Go to **Database** → Select Instruments or Gauges
   - Click a type → **Add** individual items or **Import** from Excel
   - Assign RFID tags to each tool

3. **Start a Cycle**
   - Go to **Interchangeability** → Department List tab
   - **Import** the cycle Excel file (instrument assignments per department)
   - Data auto-syncs to the Interchange tab

4. **Daily Operations**
   - Use **Interchange** tab to Issue/Receive/Track tools
   - Scan RFID tags for quick identification
   - Mark missing tools as WOP, write off damaged ones

5. **Calibration**
   - Go to **Calibration** → Regular Calibration
   - Click instrument **Control No** → calibration form opens
   - Enter environment data and trial observations
   - System auto-calculates TMU and OK/NG status
   - View NG List for failed items

6. **Inventory Audit**
   - Go to **Inventory Management** → Audit or Bulk Search
   - Use RFID scanning to verify physical inventory
   - Compare against database records

7. **End of Cycle**
   - Go to **Interchangeability** → Click **Next Cycle**
   - System archives, carries over WOP, and starts fresh

---

> [!TIP]
> **Key Data Tables Reference:**
> - `type_details` — All registered instrument/gauge types
> - `departmentmaster` — Department list
> - `department_list` — Cycle import staging
> - `interchangeability` — Active cycle tracking
> - `interchange_history` — Archived cycle data
> - `regular_calibration` — Calibration status per instrument per cycle
> - `calibrationmapping` — Links types to calibration forms
> - `calibrationmaster` / `calibrationmaster_details` — Master calibration instruments
> - `writeoff` / `reintroduction` / `wop` / `issue` / `receive` / `temporary_issuance` — Transaction tables
> - Dynamic tables (one per type) — Instrument/gauge master data
